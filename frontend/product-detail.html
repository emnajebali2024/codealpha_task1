<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail — ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="toast-box" id="toast-box"></div>

<!-- NAVBAR -->
<nav class="sn-nav navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><div class="brand-icon">🛍</div> ShopNova</a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a href="cart.html" class="cart-ico">🛒 <span class="cart-badge" style="display:none">0</span></a>
      <div id="guest-nav" class="d-flex gap-2">
        <a href="login.html" class="btn-ghost" style="padding:7px 18px;font-size:0.82rem">Login</a>
      </div>
      <div id="user-nav" class="dropdown" style="display:none">
        <button class="u-btn dropdown-toggle" data-bs-toggle="dropdown">
          <img id="user-avt" src="" class="u-avt" alt=""><span id="user-name">User</span>
        </button>
        <ul class="dropdown-menu glass-dd dropdown-menu-end">
          <li><a class="dropdown-item" href="orders.html"> My Orders</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item logout-btn" href="#"> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div style="padding:100px 0 24px;background:linear-gradient(180deg,#0F0C29,transparent)">
  <div class="container">
    <p style="font-size:0.82rem;color:var(--text-3)">
      <a href="index.html" style="color:var(--text-3)">Home</a> →
      <a href="products.html" style="color:var(--text-3)">Products</a> →
      <span id="bread-name" style="color:var(--primary)">Loading...</span>
    </p>
  </div>
</div>

<!-- PRODUCT DETAIL -->
<section class="container pb-5">
  <div id="detail-wrap">
    <div class="row g-5">
      <div class="col-lg-5">
        <div class="skel" style="height:420px;border-radius:20px"></div>
      </div>
      <div class="col-lg-7">
        <div class="skel" style="height:40px;margin-bottom:12px"></div>
        <div class="skel" style="height:25px;width:50%;margin-bottom:20px"></div>
        <div class="skel" style="height:80px;margin-bottom:20px"></div>
        <div class="skel" style="height:50px;width:70%"></div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const id   = new URLSearchParams(window.location.search).get('id');
  const wrap = document.getElementById('detail-wrap');
  if (!id) { wrap.innerHTML = '<p style="color:var(--danger)">Product ID missing.</p>'; return; }

  try {
    const { product: p } = await window.SN.fetch(`/products/${id}`);
    document.title = `${p.name} — ShopNova`;
    document.getElementById('bread-name').textContent = p.name;

    const imgs = p.images?.length ? p.images : [`https://via.placeholder.com/600x420/7C3AED/fff?text=${encodeURIComponent(p.name)}`];
    const disc = p.originalPrice ? Math.round(((p.originalPrice - p.price) / p.originalPrice) * 100) : 0;

    wrap.innerHTML = `
      <div class="row g-5 align-items-start">
        <!-- Images -->
        <div class="col-lg-5">
          <div class="detail-img-box mb-3">
            <img id="main-img" src="${imgs[0]}" alt="${p.name}" style="width:100%;height:420px;object-fit:cover;border-radius:20px">
          </div>
          <div class="thumb-strip">
            ${imgs.map((im,i) => `<div class="thumb ${i===0?'active':''}" onclick="setImg('${im}',this)"><img src="${im}" alt=""></div>`).join('')}
          </div>
        </div>

        <!-- Info -->
        <div class="col-lg-7">
          <div style="font-size:0.78rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">${p.category} · ${p.brand || 'Generic'}</div>
          <h1 style="font-size:1.7rem;font-weight:800;color:#fff;line-height:1.25;margin-bottom:14px">${p.name}</h1>

          <div class="d-flex align-items-center gap-3 mb-3">
            <span style="color:#F59E0B;font-size:1rem">${window.SN.stars(p.ratings||0)}</span>
            <span style="color:var(--text-2);font-size:0.875rem">${(p.ratings||0).toFixed(1)} · ${p.numReviews||0} reviews</span>
            <span style="font-size:0.78rem;color:${p.stock>0?'#10B981':'#EF4444'};font-weight:700">
              ${p.stock > 0 ? `✓ In Stock (${p.stock})` : '✕ Out of Stock'}
            </span>
          </div>

          <div class="d-flex align-items-baseline gap-3 mb-4">
            <span class="price-big">$${p.price.toFixed(2)}</span>
            ${p.originalPrice ? `<span class="price-orig-big">$${p.originalPrice.toFixed(2)}</span>` : ''}
            ${disc > 0 ? `<span class="disc-pill">Save ${disc}%</span>` : ''}
          </div>

          <p style="color:var(--text-2);font-size:0.9rem;line-height:1.75;margin-bottom:26px">${p.description}</p>

          ${p.tags?.length ? `<div class="d-flex flex-wrap gap-2 mb-4">${p.tags.map(t=>`<span style="background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.2);color:#A78BFA;font-size:0.75rem;padding:3px 12px;border-radius:20px">#${t}</span>`).join('')}</div>` : ''}

          <div class="d-flex align-items-center gap-4 mb-5">
            <div>
              <div style="font-size:0.78rem;color:var(--text-3);margin-bottom:8px">QUANTITY</div>
              <div class="qty-box">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-val" id="qty-val">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-3">
            <button class="btn-gp" style="padding:14px 34px;font-size:1rem" onclick="addToCart('${p._id}')" ${p.stock===0?'disabled':''}>
              🛒 Add to Cart
            </button>
            <a href="cart.html" class="btn-ghost" style="padding:14px 28px;font-size:1rem">Go to Cart →</a>
          </div>

          <div class="d-flex gap-4 mt-5 flex-wrap">
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:1.4rem">🚀</span>
              <div><div style="font-size:0.78rem;font-weight:700;color:#fff">Free Delivery</div><div style="font-size:0.72rem;color:var(--text-3)">On orders over $100</div></div>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:1.4rem">🔄</span>
              <div><div style="font-size:0.78rem;font-weight:700;color:#fff">30-Day Returns</div><div style="font-size:0.72rem;color:var(--text-3)">Hassle-free returns</div></div>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:1.4rem">🔒</span>
              <div><div style="font-size:0.78rem;font-weight:700;color:#fff">Secure Checkout</div><div style="font-size:0.72rem;color:var(--text-3)">SSL encrypted</div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Reviews -->
      <div class="divider"></div>
      <h3 class="s-title mb-4">Customer <span class="text-grad">Reviews</span></h3>
      <div class="row g-4">
        ${p.reviews?.length
          ? p.reviews.map(r => `
            <div class="col-md-6 col-lg-4">
              <div class="feat-card text-start" style="padding:20px">
                <div class="d-flex align-items-center gap-10 mb-3" style="gap:12px">
                  <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${r.name}" style="width:42px;height:42px;border-radius:50%;background:rgba(124,58,237,0.2)" alt="${r.name}">
                  <div>
                    <div style="font-weight:700;color:#fff;font-size:0.875rem">${r.name}</div>
                    <div style="color:#F59E0B;font-size:0.78rem">${'★'.repeat(r.rating)}</div>
                  </div>
                </div>
                <p style="color:var(--text-2);font-size:0.85rem;margin:0">${r.comment}</p>
              </div>
            </div>`).join('')
          : '<div class="col-12"><p style="color:var(--text-2)">No reviews yet. Be the first!</p></div>'
        }
      </div>
    `;
  } catch(e) {
    wrap.innerHTML = `<div class="text-center py-5"><p style="color:var(--danger)">Error: ${e.message}</p><a href="products.html" class="btn-gp mt-3">← Back to Products</a></div>`;
  }
});

let qty = 1;
window.changeQty = (dir) => {
  qty = Math.max(1, qty + dir);
  document.getElementById('qty-val').textContent = qty;
};

window.setImg = (src, el) => {
  document.getElementById('main-img').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
};

window.addToCart = async (id) => {
  if (!window.SN.token()) { window.location.href = `login.html?redirect=product-detail.html?id=${id}`; return; }
  try {
    const data = await window.SN.fetch('/cart/add', { method: 'POST', body: JSON.stringify({ productId: id, quantity: qty }) });
    window.SN.setCartCount(data.cart.items.reduce((s, i) => s + i.quantity, 0));
    window.SN.toast('Added to cart! 🛒', 's');
  } catch(e) { window.SN.toast(e.message, 'e'); }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">
<div class="toast-box" id="toast-box"></div>

<nav class="sn-nav navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><div class="brand-icon">🛍</div> ShopNova</a>
    <div class="d-flex gap-2 ms-auto">
      <div id="guest-nav" class="d-flex gap-2">
        <a href="login.html" class="btn-ghost" style="padding:7px 18px;font-size:0.82rem">Login</a>
      </div>
      <div id="user-nav" class="dropdown" style="display:none">
        <button class="u-btn dropdown-toggle" data-bs-toggle="dropdown">
          <img id="user-avt" src="" class="u-avt" alt=""><span id="user-name">User</span>
        </button>
        <ul class="dropdown-menu glass-dd dropdown-menu-end">
          <li><a class="dropdown-item" href="orders.html">📦 My Orders</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item logout-btn" href="#">🚪 Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div style="padding-top:100px"></div>
<div class="container pb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="s-title">My <span class="text-grad">Cart</span> 🛒</h1>
    <button onclick="clearCart()" class="btn-ghost" style="font-size:0.82rem;padding:8px 18px">🗑 Clear All</button>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div id="cart-list"></div>
    </div>
    <div class="col-lg-4">
      <div class="cart-summary">
        <h5 style="font-weight:800;color:#fff;margin-bottom:20px">Order Summary</h5>
        <div id="summary-items"></div>
        <a href="checkout.html" class="btn-gp w-100 justify-content-center mt-3" style="padding:13px;font-size:1rem">
          Proceed to Checkout →
        </a>
        <a href="products.html" class="btn-ghost w-100 justify-content-center mt-2" style="padding:11px;font-size:0.875rem">
          ← Continue Shopping
        </a>
        <!-- Trust badges -->
        <div class="mt-4 pt-3" style="border-top:1px solid var(--glass-border)">
          <div style="font-size:0.72rem;color:var(--text-3);text-align:center;margin-bottom:10px">SECURE CHECKOUT</div>
          <div class="d-flex justify-content-center gap-3" style="font-size:1.3rem">🔒 💳 🚀</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
</body>
</html>

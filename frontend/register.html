<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
<div class="toast-box" id="toast-box"></div>

<div style="position:fixed;inset:0;background:linear-gradient(135deg,#0F0C29,#302B63,#24243E);z-index:-2"></div>
<div class="orb o1" style="position:fixed;z-index:-1"></div>
<div class="orb o3" style="position:fixed;z-index:-1"></div>

<div class="min-vh-100 d-flex flex-column justify-content-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="text-center mb-4">
          <a href="index.html" class="brand-logo d-inline-flex" style="font-size:1.6rem">
            <div class="brand-icon">🛍</div> ShopNova
          </a>
        </div>

        <div class="form-card">
          <div class="text-center mb-4">
            <h2 style="font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:6px">Create Account ✨</h2>
            <p style="color:var(--text-2);font-size:0.875rem">Join thousands of happy shoppers</p>
          </div>

          <div id="reg-err" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:10px 14px;font-size:0.82rem;color:#EF4444;margin-bottom:18px" class="d-none"></div>

          <form id="reg-form" novalidate>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input id="reg-name" class="form-ctrl" type="text" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input id="reg-email" class="form-ctrl" type="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3" style="position:relative">
              <label class="form-label">Password</label>
              <input id="reg-pwd" class="form-ctrl" type="password" placeholder="Min. 6 characters" required>
              <button type="button" id="pwd-eye" class="eye-btn">👁</button>
            </div>

            <!-- Password strength -->
            <div class="mb-4">
              <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:6px">
                <div id="pwd-bar" style="height:100%;width:0%;transition:all 0.3s;border-radius:4px"></div>
              </div>
              <span id="pwd-txt" style="font-size:0.72rem;font-weight:600"></span>
            </div>

            <div class="mb-4">
              <label style="display:flex;align-items:flex-start;gap:10px;font-size:0.82rem;color:var(--text-2);cursor:pointer">
                <input type="checkbox" id="reg-terms" style="accent-color:var(--primary);margin-top:2px">
                I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> & <a href="#" style="color:var(--primary)">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" id="reg-btn" class="btn-gp w-100 justify-content-center" style="padding:13px;font-size:1rem">
              Create Account
            </button>
          </form>

          <p class="text-center mt-4 mb-0" style="font-size:0.875rem;color:var(--text-2)">
            Already have an account? <a href="login.html" style="color:var(--primary);font-weight:700">Sign in →</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

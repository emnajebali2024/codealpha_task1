<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="toast-box" id="toast-box"></div>

<!-- NAVBAR (same as index) -->
<nav class="sn-nav navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><div class="brand-icon">🛍</div> ShopNova</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" style="color:#fff;background:var(--glass);border-radius:8px;padding:6px 10px">☰</button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">🏠 Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="products.html">🛒 Products</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <div class="nav-search">
          <input id="nav-search" class="s-input" placeholder="Search products..." type="text">
          <button id="nav-search-btn" class="s-btn">🔍</button>
        </div>
        <a href="cart.html" class="cart-ico">🛒 <span class="cart-badge" style="display:none">0</span></a>
        <div id="guest-nav" class="d-flex gap-2">
          <a href="login.html" class="btn-ghost" style="padding:7px 18px;font-size:0.82rem">Login</a>
          <a href="register.html" class="btn-gp" style="padding:7px 18px;font-size:0.82rem">Sign Up</a>
        </div>
        <div id="user-nav" class="dropdown" style="display:none">
          <button class="u-btn dropdown-toggle" data-bs-toggle="dropdown">
            <img id="user-avt" src="" class="u-avt" alt="">
            <span id="user-name">User</span>
          </button>
          <ul class="dropdown-menu glass-dd dropdown-menu-end">
            <li><a class="dropdown-item" href="orders.html"> My Orders</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item logout-btn" href="#"> Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div style="background:linear-gradient(135deg,#0F0C29,#302B63);padding:130px 0 50px;margin-bottom:0;border-bottom:1px solid var(--glass-border)">
  <div class="container">
    <div class="orb o1" style="opacity:0.4"></div>
    <div class="s-tag">Our Store</div>
    <h1 class="s-title">All <span class="text-grad">Products</span></h1>
    <p class="s-sub">Find everything you need in one place</p>
    <div class="mt-3" style="font-size:0.82rem;color:var(--text-3)">
      <a href="index.html" style="color:var(--text-3)">Home</a> → <span style="color:var(--primary)">Products</span>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container py-5" style="margin-top:0">
  <div class="row g-4">

    <!-- SIDEBAR -->
    <div class="col-lg-3">
      <div class="sidebar">
        <div class="f-group">
          <div class="f-label">🔍 Search</div>
          <div style="position:relative">
            <input id="prod-search" class="form-ctrl" placeholder="Search products..." type="text" style="padding-right:40px">
          </div>
        </div>

        <div class="f-group">
          <div class="f-label">📂 Categories</div>
          <div class="f-check">
            <label><input type="checkbox" value="Electronics"> ⚡ Electronics</label>
            <label><input type="checkbox" value="Clothing"> 👗 Clothing</label>
            <label><input type="checkbox" value="Sports"> 🏃 Sports</label>
            <label><input type="checkbox" value="Books"> 📚 Books</label>
            <label><input type="checkbox" value="Home & Garden"> 🏡 Home & Garden</label>
            <label><input type="checkbox" value="Beauty"> 💄 Beauty</label>
            <label><input type="checkbox" value="Toys"> 🧸 Toys</label>
            <label><input type="checkbox" value="Automotive"> 🚗 Automotive</label>
          </div>
        </div>

        <div class="f-group">
          <div class="f-label">💰 Price Range</div>
          <input type="range" class="price-range" id="price-range" min="0" max="3000" value="3000" step="50">
          <div class="price-vals"><span>$0</span><span id="max-price-val">$3000</span></div>
        </div>

        <div class="f-group">
          <div class="f-label">↕ Sort By</div>
          <select id="sort-sel" class="sort-select">
            <option value="newest">Newest First</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="rating">Best Rated</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>

        <button onclick="clearFilters()" class="btn-ghost w-100 justify-content-center" style="font-size:0.82rem">🗑 Clear Filters</button>
      </div>
    </div>

    <!-- PRODUCTS GRID -->
    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span id="prod-count" style="color:var(--text-2);font-size:0.875rem">Loading...</span>
      </div>
      <div class="row" id="prod-grid"></div>
      <div id="pagination" class="mt-4"></div>
    </div>
  </div>
</div>

<!-- FOOTER (minimal) -->
<footer style="background:rgba(0,0,0,0.2);border-top:1px solid var(--glass-border);padding:24px 0;margin-top:40px">
  <div class="container text-center">
    <p class="copy mb-0">© 2024 ShopNova — CodeAlpha Internship Project</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/products.js"></script>
</body>
</html>

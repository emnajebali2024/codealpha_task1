<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ShopNova</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="checkout">
<div class="toast-box" id="toast-box"></div>

<nav class="sn-nav navbar fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><div class="brand-icon">🛍</div> ShopNova</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <div id="guest-nav"><a href="login.html" class="btn-ghost" style="padding:7px 18px;font-size:0.82rem">Login</a></div>
      <div id="user-nav" style="display:none" class="dropdown">
        <button class="u-btn dropdown-toggle" data-bs-toggle="dropdown"><img id="user-avt" src="" class="u-avt" alt=""><span id="user-name"></span></button>
        <ul class="dropdown-menu glass-dd dropdown-menu-end"><li><a class="dropdown-item logout-btn" href="#">🚪 Logout</a></li></ul>
      </div>
    </div>
  </div>
</nav>

<div style="padding-top:100px"></div>
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h1 class="s-title mb-5">Checkout <span class="text-grad">✅</span></h1>
      <div class="form-card">
        <form id="checkout-form" novalidate>
          <h5 style="font-weight:700;color:#fff;margin-bottom:20px">🏠 Shipping Address</h5>
          <div class="row g-3 mb-4">
            <div class="col-12">
              <label class="form-label">Full Name</label>
              <input id="full-name" class="form-ctrl" type="text" placeholder="John Doe" required>
            </div>
            <div class="col-12">
              <label class="form-label">Street Address</label>
              <input id="address" class="form-ctrl" type="text" placeholder="123 Main Street, Apt 4B" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">City</label>
              <input id="city" class="form-ctrl" type="text" placeholder="Sousse" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">State / Region</label>
              <input id="state" class="form-ctrl" type="text" placeholder="Sousse Governorate">
            </div>
            <div class="col-md-6">
              <label class="form-label">Zip Code</label>
              <input id="zip" class="form-ctrl" type="text" placeholder="4000">
            </div>
            <div class="col-md-6">
              <label class="form-label">Country</label>
              <input id="country" class="form-ctrl" type="text" placeholder="Tunisia" value="Tunisia">
            </div>
            <div class="col-12">
              <label class="form-label">Phone</label>
              <input id="phone" class="form-ctrl" type="text" placeholder="+216 XX XXX XXX">
            </div>
          </div>

          <hr style="border-color:var(--glass-border);margin:28px 0">
          <h5 style="font-weight:700;color:#fff;margin-bottom:20px">💳 Payment Method</h5>

          <div class="d-flex flex-column gap-2 mb-5">
            <label style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(124,58,237,0.4);border-radius:12px;cursor:pointer">
              <input type="radio" name="payment" value="cash" checked style="accent-color:var(--primary)">
              <span style="font-size:1.2rem">💵</span>
              <div><strong style="color:#fff">Cash on Delivery</strong><br><small style="color:var(--text-3)">Pay when your order arrives</small></div>
            </label>
            <label style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,0.03);border:1.5px solid var(--glass-border);border-radius:12px;cursor:pointer">
              <input type="radio" name="payment" value="card" style="accent-color:var(--primary)">
              <span style="font-size:1.2rem">💳</span>
              <div><strong style="color:#fff">Credit / Debit Card</strong><br><small style="color:var(--text-3)">Visa, Mastercard, Amex</small></div>
            </label>
            <label style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,0.03);border:1.5px solid var(--glass-border);border-radius:12px;cursor:pointer">
              <input type="radio" name="payment" value="paypal" style="accent-color:var(--primary)">
              <span style="font-size:1.2rem">🅿</span>
              <div><strong style="color:#fff">PayPal</strong><br><small style="color:var(--text-3)">Fast & secure PayPal payment</small></div>
            </label>
          </div>

          <div class="mb-4">
            <label class="form-label">Order Notes (optional)</label>
            <textarea id="notes" class="form-ctrl" rows="3" placeholder="Special instructions for delivery..."></textarea>
          </div>

          <button type="submit" id="order-btn" class="btn-gp w-100 justify-content-center" style="padding:15px;font-size:1.05rem">
             Place Order
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
